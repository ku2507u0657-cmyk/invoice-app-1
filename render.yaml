services:
  - type: web
    name: invoicehub
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: invoicehub-db
          property: connectionString

databases:
  - name: invoicehub-db
    databaseName: invoicehub
    user: invoicehub
